<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Model D ADSR Visualiser - Sustain Marker v17</title>
<!-- v17: sustain-marker model with thick white A/D/R strokes and soft coloured centre lines. -->
<style>
  :root{
    --bg:#00ff00;
    --fg:#ffffff;
    --line:#ffffff;
    --lineWidth:14;
    --innerLineWidth:6;
    --attackColor:#ff6b6b;
    --decayColor:#5fa8ff;
    --releaseColor:#b57cff;
    --boundsColor:#ffffff;
    --panel:rgba(0,0,0,.28);
    --panel2:rgba(0,0,0,.42);
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    min-height:100vh;
    background:var(--bg);
    color:var(--fg);
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;
  }
  .stage{
    height:68vh;
    min-height:390px;
    padding:34px 42px 8px;
  }
  svg{width:100%; height:100%; display:block; overflow:visible;}
  .axis,.grid{stroke:rgba(255,255,255,.35); stroke-width:2; vector-effect:non-scaling-stroke;}
  .grid{display:none; opacity:0; stroke:transparent;}
  .env-outer{fill:none; stroke:var(--line); stroke-width:var(--lineWidth); stroke-linecap:square; stroke-linejoin:round; vector-effect:non-scaling-stroke;}
  .env-inner{fill:none; stroke-width:var(--innerLineWidth); stroke-linecap:square; stroke-linejoin:round; vector-effect:non-scaling-stroke;}
  .attack-inner{stroke:var(--attackColor);}
  .decay-inner{stroke:var(--decayColor);}
  .release-inner{stroke:var(--releaseColor);}
  .env-dot{fill:var(--line); stroke:none; opacity:0;}
  @keyframes blobPulse{from{opacity:1} to{opacity:.4}}
  .tap-marker{fill:var(--line); stroke:none; opacity:0;}
  .label{fill:var(--fg); font-size:24px; font-weight:800; letter-spacing:.08em; text-transform:uppercase;}
  .small-label{fill:var(--fg); font-size:17px; font-weight:700;}
  .ui{
    height:32vh;
    min-height:250px;
    display:grid;
    grid-template-columns: 1.6fr 1.15fr 1.15fr;
    gap:14px;
    padding:10px 18px 18px;
  }
  .panel{
    background:var(--panel);
    border:1px solid rgba(255,255,255,.35);
    border-radius:18px;
    padding:14px;
    backdrop-filter:blur(2px);
  }
  .knobs{display:grid; grid-template-columns:repeat(5,1fr); gap:12px; align-items:start;}
  .knobBox{text-align:center;}
  .knobLabel{font-weight:900; font-size:14px; letter-spacing:.08em; margin-bottom:4px;}
  .knob{
    width:72px; height:72px; margin:0 auto 6px; border-radius:50%;
    background:radial-gradient(circle at 36% 30%, #666, #222 68%, #070707 100%);
    border:3px solid rgba(255,255,255,.8); position:relative;
  }
  .knob::after{
    content:""; position:absolute; left:50%; top:7px; width:4px; height:27px; border-radius:4px;
    background:var(--fg); transform-origin:50% 29px; transform:translateX(-50%) rotate(var(--deg, -135deg));
  }
  input[type=range]{width:100%; accent-color:white;}
  .readout{font-size:17px; font-weight:900; min-height:22px;}
  .targetReadout{font-size:13px; font-weight:700; opacity:.9; min-height:18px;}
  .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:8px 0;}
  button, .fakeButton{
    appearance:none; border:1px solid rgba(255,255,255,.8); background:var(--panel2); color:var(--fg);
    border-radius:12px; padding:10px 13px; font-size:15px; font-weight:900; cursor:pointer;
  }
  button:hover{background:rgba(255,255,255,.22)}
  button.primary{font-size:20px; padding:13px 18px; border-width:2px;}
  label{font-size:14px; font-weight:800; letter-spacing:.02em;}
  input[type=checkbox]{transform:scale(1.35); accent-color:white; margin-right:7px;}
  input[type=color]{width:42px; height:32px; padding:0; border:1px solid white; background:transparent;}
  input[type=number]{width:78px; border:1px solid white; background:rgba(0,0,0,.25); color:white; border-radius:8px; padding:7px; font-weight:800;}
  .seg{display:flex; gap:7px; align-items:center; flex-wrap:wrap;}
  .seg input{display:none}
  .seg span{display:inline-block; border:1px solid rgba(255,255,255,.75); border-radius:999px; padding:8px 12px; font-weight:900; cursor:pointer; background:rgba(0,0,0,.22)}
  .seg input:checked + span{background:white; color:#111;}
  .hint{font-size:13px; line-height:1.35; opacity:.88; margin-top:8px;}

  /* transport/action button overrides */
  .transport button,
  .actions button,
  button#tap,
  button#hold,
  button#release,
  button#clear,
  #tapButton,
  #holdButton,
  #releaseButton,
  #clearButton {
    font-size: 18px !important;
    padding: 10px 18px !important;
    min-height: 42px !important;
    line-height: 1.1 !important;
    border-radius: 10px !important;
  }
  .transport, .actions {gap: 10px !important;}

  /* numeric ms / value controls */
  .numeric-ms-control,
  .numeric-value-control {margin-top: 4px; font-size: 12px; color: #fff;}
  .numeric-ms-control input,
  .numeric-value-control input {
    width: 72px;
    background: rgba(255,255,255,.14);
    color: #fff;
    border: 1px solid #fff;
    border-radius: 5px;
    padding: 3px 5px;
    text-align: right;
    font-weight: 700;
  }

  /* hide axis / reference lines */
  .axis,
  .x-axis,
  .y-axis,
  .axis-line,
  .axisLabel,
  .axis-label,
  .zero-line,
  .reference-line,
  .guide-axis,
  #xAxis,
  #yAxis,
  #x-axis,
  #y-axis,
  #axisX,
  #axisY {
    display: none !important;
    opacity: 0 !important;
  }

  /* click / press feedback */
  button.v27-clicked,
  .button.v27-clicked,
  button.v28-pressed,
  .button.v28-pressed {
    background: #ffffff !important;
    color: #008000 !important;
    border-color: #ffffff !important;
    transform: scale(0.97);
  }

  /* hide A/D/R labels */
  #aLabel, #dLabel, #rLabel,
  .a-label, .d-label, .r-label {
    display: none !important;
    opacity: 0 !important;
  }
</style>
</head>
<body>
  <div class="stage">
    <svg id="svg" viewBox="0 0 1200 520" preserveAspectRatio="xMidYMid meet" aria-label="ADSR envelope graph">
      <g id="envSegments">
        <path id="attackOuter" class="env-outer" d="" />
        <path id="decayOuter" class="env-outer" d="" />
        <path id="releaseOuter" class="env-outer" d="" />
        <path id="attackInner" class="env-inner attack-inner" d="" />
        <path id="decayInner" class="env-inner decay-inner" d="" />
        <path id="releaseInner" class="env-inner release-inner" d="" />
      </g>
      <line id="sustainMarker" x1="80" y1="445" x2="80" y2="445" style="stroke:var(--line);stroke-opacity:.9;stroke-width:11;stroke-linecap:round;stroke-dasharray:1 24;vector-effect:non-scaling-stroke;" />
      <circle id="sustainPoint" class="tap-marker" cx="80" cy="445" r="8" style="opacity:.85" />
      <circle id="tapMarker" class="tap-marker" cx="80" cy="445" r="11" />
      <circle id="dot" class="env-dot" cx="80" cy="445" r="15" />
      <line id="floorBound"   x1="0" y1="445" x2="1200" y2="445" style="stroke:var(--boundsColor);stroke-width:7;stroke-linecap:round;stroke-opacity:1;vector-effect:non-scaling-stroke;display:none;" />
      <line id="ceilingBound" x1="0" y1="85"  x2="1200" y2="85"  style="stroke:var(--boundsColor);stroke-width:7;stroke-linecap:round;stroke-opacity:1;vector-effect:non-scaling-stroke;display:none;" />

      <rect id="meterBox"  x="1145" y="85" width="40" height="360" style="fill:none;stroke:var(--line);stroke-width:7;stroke-opacity:1;vector-effect:non-scaling-stroke;" />
      <rect id="meterFill" x="1145" y="445" width="40" height="0" style="fill:var(--line);stroke:none;" />
      <rect id="meterPeak" x="1145" y="443" width="40" height="3" style="fill:var(--line);stroke:none;display:none;" />
      <text id="meterLabelTitle" x="1165" y="72" text-anchor="middle" style="fill:var(--fg);font-size:14px;font-weight:700;display:none;">VOLUME</text>
      <line id="meterSustainTick" x1="1133" y1="300" x2="1145" y2="300" style="stroke:var(--line);stroke-width:3;stroke-linecap:square;vector-effect:non-scaling-stroke;display:none;" />
      <text id="meterSustainLabel" x="1131" y="304" text-anchor="end" style="fill:var(--fg);font-size:11px;font-weight:700;display:none;">SUSTAIN</text>

      <text id="sLabel" class="small-label" x="0" y="0">SUSTAIN</text>

      <text id="mainReadout" class="label" x="80" y="38">ATTACK 10 ms · DECAY 200 ms · SUSTAIN 50%</text>
    </svg>
  </div>

  <div class="ui">
    <div class="panel">
      <div id="presetBtns" style="display:grid;grid-template-columns:repeat(13,1fr);gap:4px;margin-bottom:8px"></div>
      <div class="row" style="justify-content:space-between;margin-top:0">
        <div class="seg" title="Live means knobs update the graph immediately. Animate means knobs set targets.">
          <label><input type="radio" name="mode" value="live" checked><span>Live</span></label>
          <label><input type="radio" name="mode" value="animate"><span>Animate</span></label>
        </div>
        <span id="presetName" style="font-size:13px;font-weight:700;opacity:.85"></span>
      </div>
      <div class="knobs">
        <div class="knobBox">
          <div class="knobLabel">Attack</div>
          <div id="attackKnob" class="knob"></div>
          <input id="attack" type="range" min="0" max="1000" value="80">
          <div id="attackRead" class="readout"></div>
          <div id="attackTarget" class="targetReadout"></div>
        </div>
        <div class="knobBox">
          <div class="knobLabel">Decay</div>
          <div id="decayKnob" class="knob"></div>
          <input id="decay" type="range" min="0" max="1000" value="250">
          <div id="decayRead" class="readout"></div>
          <div id="decayTarget" class="targetReadout"></div>
        </div>
        <div class="knobBox">
          <div class="knobLabel">Sustain</div>
          <div id="sustainKnob" class="knob"></div>
          <input id="sustain" type="range" min="0" max="1000" value="500">
          <div id="sustainRead" class="readout"></div>
          <div id="sustainTarget" class="targetReadout"></div>
        </div>
        <div id="floorKnobBox" class="knobBox">
          <div class="knobLabel">Cutoff</div>
          <div id="floorKnob" class="knob"></div>
          <input id="floor" type="range" min="0" max="1000" value="0">
          <div id="floorRead" class="readout"></div>
          <div id="floorTarget" class="targetReadout"></div>
        </div>
        <div id="scaleKnobBox" class="knobBox">
          <div class="knobLabel">Amount</div>
          <div id="scaleKnob" class="knob"></div>
          <input id="scale" type="range" min="0" max="1000" value="1000">
          <div id="scaleRead" class="readout"></div>
          <div id="scaleTarget" class="targetReadout"></div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="row"><label><input id="loudDecay" type="checkbox"> Loud Decay / Release</label></div>
      <div class="row"><label><input id="drawReleaseWhenZero" type="checkbox"> Draw release when zero</label></div>
      <div class="row"><label><input id="showBounds" type="checkbox"> Show Full Range</label></div>
      <div class="row"><label><input id="frequencyMode" type="checkbox"> Frequency Mode</label></div>
      <div class="row"><label><input id="hpMode" type="checkbox"> LP / HP</label></div>
      <div class="row"><label><input id="keyboardControl" type="checkbox"> Mimic Model D Sustain (80%)</label></div>
      <hr style="border-color:rgba(255,255,255,.25)">
      <div class="row"><strong>Transition</strong></div>
      <div class="seg">
        <label><input type="radio" name="transition" value="1" checked><span>1s</span></label>
        <label><input type="radio" name="transition" value="2"><span>2s</span></label>
        <label><input type="radio" name="transition" value="5"><span>5s</span></label>
        <label><input type="radio" name="transition" value="custom"><span>Custom</span></label>
      </div>
      <div id="customTransitionRow" class="row" style="display:none"><label>Seconds <input id="customTransitionTime" type="number" min="0.1" max="60" step="0.1" value="3.0"></label></div>
      <div class="row"><button id="transitionBtn" class="primary">Transition</button></div>
      <div id="modeHint" class="hint">Live mode: knobs update the graph immediately.</div>
    </div>

    <div class="panel">
      <div class="row"><button id="tap50Btn">Tap 50</button><button id="tap100Btn">Tap 100</button><button id="tap200Btn">Tap 200</button><button id="tapCustomBtn">Tap Custom</button><button id="holdBtn">Hold</button><button id="releaseBtn">Release</button><button id="clearBtn">Clear</button></div>
      <div id="tapCustomRow" class="row" style="display:none"><label>ms <input id="tapCustomMs" type="number" min="20" max="5000" step="10" value="200"></label> <button id="tapGoBtn">Go</button></div>
      <div class="row"><label><input id="keepTapMarker" type="checkbox" checked> Leave Tap marker</label></div>
      <hr style="border-color:rgba(255,255,255,.25)">
      <div class="row"><label>Line <input id="lineColor" type="color" value="#ffffff"></label><label>Outer <input id="lineWidth" type="number" min="4" max="30" step="1" value="14"></label><label>Inner <input id="innerLineWidth" type="number" min="1" max="18" step="1" value="6"></label></div>
      <div class="row"><label>Background <input id="bgColor" type="color" value="#00ff00"></label></div>
      <div class="row"><label>A <input id="attackColor" type="color" value="#ff6b6b"></label><label>D <input id="decayColor" type="color" value="#5fa8ff"></label><label>R <input id="releaseColor" type="color" value="#b57cff"></label><label>Bounds <input id="boundsColor" type="color" value="#ffffff"></label></div>
      <div class="hint">Tap releases after the chosen gate time. Attack, Decay and Release are shown as white strokes with soft colour centres. Sustain is a chunky rightward dotted level guide.</div>
    </div>
  </div>

<script src="presets.js"></script>
<script>

let animationToken = 0;

const $ = id => document.getElementById(id);
const curve = [
  {p:0.00,t:0}, {p:0.08,t:0.010}, {p:0.25,t:0.200}, {p:0.42,t:0.600},
  {p:0.58,t:1.000}, {p:0.75,t:5.000}, {p:0.90,t:10.000}, {p:1.00,t:12.000}
];
const state = { a:.08, d:.25, s:.5, floor:0, scale:1, target:{a:.08,d:.25,s:.5,floor:0,scale:1}, anim:null, dotAnim:null, held:false, dotLevel:0, currentPhase:'idle', peakY:null };
const graph = { x0:80, y0:445, w:1045, h:360 };

function clamp(v,min=0,max=1){ return Math.max(min, Math.min(max, v)); }
function easeInOut(t){ return t<0.5 ? 2*t*t : -1+(4-2*t)*t; }
function mapTime(p){
  p = clamp(p);
  for(let i=0;i<curve.length-1;i++){
    const a=curve[i], b=curve[i+1];
    if(p>=a.p && p<=b.p){ const f=(p-a.p)/(b.p-a.p); return a.t + f*(b.t-a.t); }
  }
  return curve[curve.length-1].t;
}
function positionFromMs(ms){
  const sec = Math.max(0, Number(ms) || 0) / 1000;
  if (sec <= curve[0].t) return curve[0].p;
  for (let i = 0; i < curve.length - 1; i++){
    const a = curve[i], b = curve[i+1];
    if (sec >= a.t && sec <= b.t){
      const f = (sec - a.t) / (b.t - a.t || 1);
      return a.p + (b.p - a.p) * f;
    }
  }
  return curve[curve.length - 1].p;
}
function msFromPosition(p){ return Math.round(mapTime(p) * 1000); }
function fmtTime(t){
  if(t < .001) return '0 ms';
  if(t < 1) return Math.round(t*1000)+' ms';
  if(t < 10) return (Math.round(t*10)/10).toString().replace('.0','')+' s';
  return Math.round(t)+' s';
}
function displayTimeWidth(t){
  // presentation scale: visible short values, compressed long values.
  // True zero is zero-width, but the short-value boost eases in smoothly
  // to avoid an initial jump when transitioning away from zero.
  t = Math.max(0, t);
  if(t === 0) return 0;
  const shortBoost = 38 * (1 - Math.exp(-t / 0.012));
  return shortBoost + 245 * Math.log10(1 + 6.5 * t);
}
function getEffective(){
  const aT=mapTime(state.a), dT=mapTime(state.d);
  const rawS=state.s;
  const s=$('keyboardControl').checked ? rawS*.8 : rawS;
  const releaseOn=$('loudDecay').checked;
  const freqMode = $('frequencyMode') && $('frequencyMode').checked;
  const floor = freqMode ? clamp(state.floor,0,1) : 0;
  const scale = freqMode ? clamp(state.scale,0,1-floor) : 1;
  return {aT,dT,s,rawS,releaseOn,rT:releaseOn?dT:0,floor,scale};
}
function yFor(level){ return graph.y0 - level*graph.h; }
function computePoints(){
  const e=getEffective();
  const aw=displayTimeWidth(e.aT);
  const dwFull=displayTimeWidth(e.dT);
  const x0=graph.x0;

  // Experimental sustain-marker model:
  // Attack rises to peak, then there is one master downward decay/release
  // trajectory from 100% to 0%. Sustain is a level marker on that trajectory,
  // not a timed horizontal plateau.
  const p0={x:x0,y:yFor(e.floor),level:0};
  const p1={x:x0+aw,y:yFor(e.floor+e.scale),level:1};
  const pEnd={x:p1.x+dwFull,y:yFor(e.floor),level:0};
  const pS={x:p1.x+dwFull*(1-e.s),y:yFor(e.floor+e.s*e.scale),level:e.s};
  return {p0,p1,pS,pEnd,e,aw,dwFull};
}

function render(){
  const pts=computePoints();
  // Draw the envelope as separate A/D/R segments. Each segment is drawn twice:
  // a thick white outer stroke, then a softer coloured inner stroke.
  const aPath = `M ${pts.p0.x} ${pts.p0.y} L ${pts.p1.x} ${pts.p1.y}`;
  const dPath = `M ${pts.p1.x} ${pts.p1.y} L ${pts.pS.x} ${pts.pS.y}`;
  const drawZeroRelease = $('drawReleaseWhenZero').checked;
  const drawReleasePath = pts.e.releaseOn || drawZeroRelease;
  const rEnd = pts.e.releaseOn ? pts.pEnd : {x:pts.pS.x, y:pts.p0.y};
  const rPath = drawReleasePath ? `M ${pts.pS.x} ${pts.pS.y} L ${rEnd.x} ${rEnd.y}` : '';
  ['attackOuter','attackInner'].forEach(id => $(id).setAttribute('d', aPath));
  ['decayOuter','decayInner'].forEach(id => $(id).setAttribute('d', dPath));
  ['releaseOuter','releaseInner'].forEach(id => $(id).setAttribute('d', rPath));

  // Sustain as a horizontal level guide extending to the right from
  // the decay/release intersection. This reads as an indefinite held level,
  // rather than something that reaches back into the earlier decay phase.
  // Meter geometry
  const meterX = graph.x0 + graph.w + 20;  // = 1145
  const meterW = 40;
  const meterAbsTop = graph.y0 - graph.h;  // yFor(1) = 85
  const meterAbsBottom = graph.y0;          // yFor(0) = 445

  const markerEndX = meterX;
  $('sustainMarker').setAttribute('x1', pts.pS.x);
  $('sustainMarker').setAttribute('y1', pts.pS.y);
  $('sustainMarker').setAttribute('x2', markerEndX);
  $('sustainMarker').setAttribute('y2', pts.pS.y);
  $('sustainPoint').setAttribute('cx', pts.pS.x);
  $('sustainPoint').setAttribute('cy', pts.pS.y);

  $('sLabel').setAttribute('x',Math.min(markerEndX-105, pts.pS.x+28)); $('sLabel').setAttribute('y',pts.pS.y-18);

  $('mainReadout').textContent = `ATTACK ${fmtTime(pts.e.aT)} · DECAY ${fmtTime(pts.e.dT)} · SUSTAIN ${Math.round(pts.e.s*100)}%` + (pts.e.releaseOn ? ` · RELEASE ${fmtTime(pts.e.rT)}` : ' · RELEASE OFF');

  // Bounds lines — fixed at absolute graph top/bottom, full SVG width
  const showBounds = $('showBounds') && $('showBounds').checked;
  const floorBound=$('floorBound'), ceilingBound=$('ceilingBound');
  if(floorBound){ floorBound.style.display = showBounds ? '' : 'none'; }
  if(ceilingBound){ ceilingBound.style.display = showBounds ? '' : 'none'; }

  // Meter box — fixed full graph height
  const meterBox=$('meterBox');
  if(meterBox){
    meterBox.setAttribute('x',meterX); meterBox.setAttribute('y',meterAbsTop);
    meterBox.setAttribute('width',meterW); meterBox.setAttribute('height',graph.h);
  }

  // Meter labels
  const freqMode = $('frequencyMode') && $('frequencyMode').checked;
  const isHP = $('hpMode') && $('hpMode').checked;
  const meterCX = meterX + meterW/2;
  const titleEl=$('meterLabelTitle');
  if(titleEl){ titleEl.textContent=freqMode?'FREQUENCY':'VOLUME'; titleEl.setAttribute('x',meterCX); titleEl.setAttribute('y',meterAbsTop-10); titleEl.style.display=''; }
  const sustainY=pts.pS.y;
  const tickEl=$('meterSustainTick');
  if(tickEl){ tickEl.setAttribute('x1',meterX-12); tickEl.setAttribute('y1',sustainY); tickEl.setAttribute('x2',meterX); tickEl.setAttribute('y2',sustainY); tickEl.style.display=''; }
  const sustLblEl=$('meterSustainLabel');
  if(sustLblEl){ sustLblEl.setAttribute('x',meterX-14); sustLblEl.setAttribute('y',sustainY+4); sustLblEl.style.display=''; }

  // Cutoff/Amount knobs: active only in Frequency Mode
  const floorBox=$('floorKnobBox'), scaleBox=$('scaleKnobBox');
  if(floorBox) floorBox.style.opacity=freqMode?'':'0.35';
  if(scaleBox) scaleBox.style.opacity=freqMode?'':'0.35';

  // Keep resting meter fill in sync whenever no animation is running
  if(state.currentPhase === 'idle') hideDot();

  syncControls();
  updateButtonStates();
  setTimeout(refreshNumericInputs, 0); // keep numeric inputs in sync after every render
}

function syncControls(){
  const mode=document.querySelector('input[name="mode"]:checked').value;
  const vals = mode==='live' ? state : state.target;
  $('attack').value=Math.round(vals.a*1000); $('decay').value=Math.round(vals.d*1000); $('sustain').value=Math.round(vals.s*1000);
  $('floor').value=Math.round(vals.floor*1000); $('scale').value=Math.round(vals.scale*1000);
  $('attackKnob').style.setProperty('--deg', (-135 + vals.a*270)+'deg');
  $('decayKnob').style.setProperty('--deg', (-135 + vals.d*270)+'deg');
  $('sustainKnob').style.setProperty('--deg', (-135 + vals.s*270)+'deg');
  $('floorKnob').style.setProperty('--deg', (-135 + vals.floor*270)+'deg');
  $('scaleKnob').style.setProperty('--deg', (-135 + vals.scale*270)+'deg');
  $('attackRead').textContent=fmtTime(mapTime(state.a)); $('decayRead').textContent=fmtTime(mapTime(state.d)); $('sustainRead').textContent=Math.round(getEffective().s*100)+'%';
  $('floorRead').textContent=formatSustainScale(state.floor); $('scaleRead').textContent=formatSustainScale(state.scale);
  $('attackTarget').textContent=mode==='animate' ? 'Target: '+fmtTime(mapTime(state.target.a)) : '';
  $('decayTarget').textContent=mode==='animate' ? 'Target: '+fmtTime(mapTime(state.target.d)) : '';
  $('sustainTarget').textContent=mode==='animate' ? 'Target: '+Math.round(($('keyboardControl').checked?state.target.s*.8:state.target.s)*100)+'%' : '';
  $('floorTarget').textContent=mode==='animate' ? 'Target: '+formatSustainScale(state.target.floor) : '';
  $('scaleTarget').textContent=mode==='animate' ? 'Target: '+formatSustainScale(state.target.scale) : '';
  $('modeHint').textContent = mode==='live' ? 'Live mode: knobs update the graph immediately.' : 'Animate mode: knobs set targets. Press Transition to morph the graph.';
  patchSustainReadouts(); // keep sustain 0-10 scale display correct
}

function transition(){
  clearBlobAndMarker();
  animationToken++;
  const myAnimationToken = animationToken;
  hideTapMarker();
  const selected=document.querySelector('input[name="transition"]:checked').value;
  const dur=(selected==='custom' ? Number($('customTransitionTime').value)||3 : Number(selected))*1000;
  const start={a:state.a,d:state.d,s:state.s,floor:state.floor,scale:state.scale}, end={...state.target};
  const startAms=mapTime(start.a)*1000, endAms=mapTime(end.a)*1000;
  const startDms=mapTime(start.d)*1000, endDms=mapTime(end.d)*1000;
  cancelAnimationFrame(state.anim);
  state.a=start.a; state.d=start.d; state.s=start.s; state.floor=start.floor; state.scale=start.scale;
  render();
  let t0=null;
  function step(now){
    if (myAnimationToken !== animationToken) return;
    if(t0===null) t0=now;
    const f=clamp((now-t0)/dur); const k=easeInOut(f);
    state.a=positionFromMs(startAms+(endAms-startAms)*k);
    state.d=positionFromMs(startDms+(endDms-startDms)*k);
    state.s=start.s+(end.s-start.s)*k;
    state.floor=start.floor+(end.floor-start.floor)*k;
    state.scale=start.scale+(end.scale-start.scale)*k;
    render();
    if(f<1) state.anim=requestAnimationFrame(step); else { state.a=end.a; state.d=end.d; state.s=end.s; state.floor=end.floor; state.scale=end.scale; render(); }
  }
  state.anim=requestAnimationFrame(step);
}

  $('customTransitionRow').style.display = document.querySelector('input[name="transition"]:checked').value==='custom' ? '' : 'none';
}));

function pointOnAttackDecay(ms){
  const pts=computePoints(), e=pts.e; const t=ms/1000;

  if(e.aT > .0005 && t <= e.aT){
    const f=clamp(t/e.aT);
    return { x:pts.p0.x+(pts.p1.x-pts.p0.x)*f, y:pts.p0.y+(pts.p1.y-pts.p0.y)*f, level:f, phase:'attack' };
  }

  const after = e.aT <= .0005 ? t : t-e.aT;
  const f=e.dT<=.0005 ? 1 : clamp(after/e.dT);
  const level=1-f;
  const phase = level <= e.s + .0001 ? 'sustain' : 'decay';
  return { x:pts.p1.x+(pts.pEnd.x-pts.p1.x)*f, y:yFor(e.floor+level*e.scale), level, phase };
}

// Gate-high behaviour: attack, then decay only until the sustain level.
// If the gate is still high after that, the blob parks at the sustain intersection.
function pointWhileGateHigh(ms){
  const pts=computePoints(), e=pts.e;
  const pt = pointOnAttackDecay(ms);
  if(pt.phase === 'sustain' || (pt.phase !== 'attack' && pt.level <= e.s + .0001)){
    return { x:pts.pS.x, y:pts.pS.y, level:e.s, phase:'sustain' };
  }
  return pt;
}

function setMeterLevel(level){
  const fill=$('meterFill'), peak=$('meterPeak');
  if(!fill) return;
  const e=getEffective();
  const mx=graph.x0+graph.w+20, mw=40;
  const bottomAbsY=graph.y0;           // yFor(0) = 445
  const topAbsY=graph.y0-graph.h;      // yFor(1) = 85
  const levelY=yFor(e.floor+level*e.scale);
  const isHP=$('hpMode')&&$('hpMode').checked;
  fill.setAttribute('x',mx); fill.setAttribute('width',mw);
  if(!isHP){
    // LP: fill from absolute bottom up to blob level
    const h=Math.max(0,bottomAbsY-levelY);
    fill.setAttribute('y',levelY); fill.setAttribute('height',h);
  } else {
    // HP: fill from absolute top down to blob level
    const blobY = levelY;
    const topY = yFor(1);
    fill.setAttribute('y', String(topY));
    fill.setAttribute('height', String(blobY - topY));
  }
  // Peak hold: LP tracks min Y (highest visual point); HP tracks max Y (lowest visual point)
  const noPeak = state.peakY === null;
  const movePeak = noPeak || (!isHP ? levelY < state.peakY : levelY > state.peakY);
  if(peak && movePeak){
    state.peakY = levelY;
    peak.setAttribute('x',mx); peak.setAttribute('width',mw);
    peak.setAttribute('y',Math.round(levelY)-1); peak.setAttribute('height',3);
    peak.style.display='';
  }
}

function hideDot(){
  const dot=$('dot');
  dot.style.opacity=0;
  dot.style.visibility='hidden';
  const fill=$('meterFill');
  if(fill){
    const e=getEffective();
    const mx=graph.x0+graph.w+20, mw=40;
    const isHP=$('hpMode')&&$('hpMode').checked;
    fill.setAttribute('x',mx); fill.setAttribute('width',mw);
    if(!isHP){
      // LP: show always-open region (absolute bottom up to floor level)
      const floorY=yFor(e.floor), bottomAbsY=graph.y0;
      fill.setAttribute('y',floorY); fill.setAttribute('height',Math.max(0,bottomAbsY-floorY));
    } else {
      // HP: show always-open region (absolute top down to ceiling level)
      const blobY = yFor(e.floor + e.scale);
      const topY = yFor(1);
      fill.setAttribute('y', String(topY));
      fill.setAttribute('height', String(blobY - topY));
    }
  }
}
function setDot(pt, visible=true){
  const dot=$('dot');
  if(!visible){ hideDot(); return; }
  dot.style.visibility='visible';
  dot.setAttribute('cx',pt.x);
  dot.setAttribute('cy',pt.y);
  dot.style.opacity='1';
  state.dotLevel=pt.level;
  setMeterLevel(pt.level);
}
function hideTapMarker(){
  const marker=$('tapMarker');
  if(marker) marker.style.opacity=0;
}
function setTapMarker(pt){
  const marker=$('tapMarker');
  if(!marker) return;
  if(!$('keepTapMarker') || !$('keepTapMarker').checked){ hideTapMarker(); return; }
  marker.setAttribute('cx',pt.x);
  marker.setAttribute('cy',pt.y);
  marker.style.opacity=1;
}

function releaseFromCurrent(){
  // Bug fix: declare and capture token here so the inner step() guard works.
  animationToken++;
  const myAnimationToken = animationToken;
  const dot=$('dot'); dot.style.animation='none'; dot.style.opacity='1';
  cancelAnimationFrame(state.dotAnim);
  const e=getEffective();

  // Loud Decay OFF: no release phase — blob vanishes instantly.
  if(!e.releaseOn){ clearBlobAndMarker(); return; }

  const pts=computePoints();
  let startLevel, startX, startY;
  if(state.held && state.currentPhase === 'sustain'){
    startLevel = pts.e.s;
    startX = pts.pS.x;
    startY = pts.pS.y;
    setDot({x:startX, y:startY, level:startLevel}, true);
  } else {
    startLevel = state.dotLevel;
    startX = Number($('dot').getAttribute('cx'));
    startY = Number($('dot').getAttribute('cy'));
  }

  // Loud Decay ON: snap start to the correct position on the decay curve for startLevel,
  // then animate along the curve to pEnd.
  startX = pts.p1.x + pts.dwFull * (1 - startLevel);
  startY = yFor(pts.e.floor + startLevel * pts.e.scale);
  const end = {x:pts.pEnd.x, y:pts.pEnd.y, level:0};
  const dur = Math.max(20, e.dT * startLevel * 1000);
  const t0=performance.now();
  state.currentPhase='release';
  function step(now){
    if (myAnimationToken !== animationToken) return;
    const f=clamp((now-t0)/dur);
    setDot({x:startX+(end.x-startX)*f, y:startY+(end.y-startY)*f, level:startLevel*(1-f)}, true);
    if(f<1) state.dotAnim=requestAnimationFrame(step); else { setDot(end,false); state.held=false; state.currentPhase='idle'; updateButtonStates(); }
  }
  requestAnimationFrame(step);
}

function updateButtonStates(){
  const phase = state.currentPhase;
  const releaseActive = phase === 'sustain' || phase === 'hold';
  $('releaseBtn').style.opacity = releaseActive ? '' : '0.35';
  $('releaseBtn').style.pointerEvents = releaseActive ? '' : 'none';
  const holdActive = phase !== 'hold' && phase !== 'sustain';
  $('holdBtn').style.opacity = holdActive ? '' : '0.35';
  $('holdBtn').style.pointerEvents = holdActive ? '' : 'none';
}

function clearBlobAndMarker(){
  cancelAnimationFrame(state.dotAnim);
  $('dot').style.animation='none';
  hideDot();
  hideTapMarker();
  state.held=false;
  state.currentPhase='idle';
  state.dotLevel=0;
  state.peakY=null;
  const peak=$('meterPeak'); if(peak) peak.style.display='none';
  updateButtonStates();
}

function tap(ms){
  if(state.currentPhase === 'hold' || state.currentPhase === 'sustain') clearBlobAndMarker();
  state.peakY=null;
  const mPk=$('meterPeak'); if(mPk) mPk.style.display='none';
  hideDot();
  hideTapMarker();
  animationToken++;
  const myAnimationToken = animationToken;
  cancelAnimationFrame(state.dotAnim);
  const tapMs=Number(ms)||200;
  const t0=performance.now();
  state.held=false;
  state.currentPhase='tap';
  updateButtonStates();
  function step(now){
    if (myAnimationToken !== animationToken) return;
    const elapsed=now-t0;
    if(elapsed < tapMs){ setDot(pointWhileGateHigh(elapsed), true); state.dotAnim=requestAnimationFrame(step); }
    else {
      const landing=pointWhileGateHigh(tapMs);
      setDot(landing, true);
      setTapMarker(landing);
      // Snap peak hold to landing Y — overrides any attack overshoot in LP, decay floor in HP
      state.peakY = landing.y;
      const pk=$('meterPeak');
      if(pk){
        const mx=graph.x0+graph.w+20;
        pk.setAttribute('x',mx); pk.setAttribute('width',40);
        pk.setAttribute('y',Math.round(landing.y)-1); pk.setAttribute('height',3);
        pk.style.display='';
      }
      const e=getEffective();
      if(e.releaseOn){
        releaseFromCurrent();
      } else {
        cancelAnimationFrame(state.dotAnim);
        hideDot();
        state.held=false;
        state.currentPhase='idle';
        state.dotLevel=landing.level;
        updateButtonStates();
      }
    }
  }
  requestAnimationFrame(step);
}

function hold(){
  state.peakY=null;
  const mPk=$('meterPeak'); if(mPk) mPk.style.display='none';
  animationToken++;
  const myAnimationToken = animationToken;
  hideTapMarker();
  cancelAnimationFrame(state.dotAnim);
  const pts=computePoints(), e=pts.e;
  const dur=(e.aT + e.dT*(1-e.s))*1000;
  const t0=performance.now();
  hideDot(); state.held=true; state.currentPhase='hold'; updateButtonStates();
  function step(now){
    if (myAnimationToken !== animationToken) return;
    const elapsed=now-t0; setDot(pointWhileGateHigh(elapsed), true);
    if(elapsed < dur) state.dotAnim=requestAnimationFrame(step); else { setDot(pts.pS,true); $('dot').style.animation='blobPulse 0.8s ease-in-out infinite alternate'; state.currentPhase='sustain'; updateButtonStates(); }
  }
  requestAnimationFrame(step);
}

const typedDisplay = {
  live: { a: null, d: null },
  animate: { a: null, d: null }
};

function currentMode(){
  const el = document.querySelector('input[name="mode"]:checked');
  return el ? el.value : 'live';
}

function activeObject(){
  return currentMode() === 'animate' ? state.target : state;
}

function formatSustainScale(v){
  const pct = Math.round(v * 100);
  const scale = v * 10;
  const scaleText = Number.isInteger(scale) ? String(scale) : scale.toFixed(1).replace(/\.0$/, '');
  return `${scaleText} (${pct}%)`;
}

function ensureInputAfter(sliderId, inputId, label, attrs){
  const slider = document.getElementById(sliderId);
  if (!slider) return null;
  let input = document.getElementById(inputId);
  if (input) return input;
  const wrap = document.createElement('div');
  wrap.className = ['sustainScaleInput','floorScaleInput','scaleScaleInput'].includes(inputId) ? 'numeric-value-control' : 'numeric-ms-control';
  wrap.innerHTML = `<label>${label} <input id="${inputId}" ${attrs}></label>`;
  slider.insertAdjacentElement('afterend', wrap);
  return document.getElementById(inputId);
}

const attackInput  = ensureInputAfter('attack',  'attackMsInput',    'Attack ms', 'type="number" min="0" max="12000" step="1"');
const decayInput   = ensureInputAfter('decay',   'decayMsInput',     'Decay ms',  'type="number" min="0" max="12000" step="1"');
const sustainInput = ensureInputAfter('sustain', 'sustainScaleInput','Sustain',   'type="number" min="0" max="10" step="0.1"');
const floorInput   = ensureInputAfter('floor',   'floorScaleInput',  'Floor',     'type="number" min="0" max="10" step="0.1"');
const scaleInput   = ensureInputAfter('scale',   'scaleScaleInput',  'Scale',     'type="number" min="0" max="10" step="0.1"');

function commitTime(which, input){
  if (!input) return;
  if(currentMode()==='live') clearBlobAndMarker();
  if(window.clearPresetDisplay) clearPresetDisplay();
  const ms = Math.max(0, Math.min(12000, Math.round(Number(input.value) || 0)));
  input.value = ms;
  const m = currentMode();
  typedDisplay[m][which] = ms;
  const obj = activeObject();
  obj[which] = positionFromMs(ms);
  if (m === 'live') {
    state.target = { a: state.a, d: state.d, s: state.s, floor: state.floor, scale: state.scale };
    render();
  } else {
    syncControls();
  }
  requestAnimationFrame(refreshNumericInputs);
}

function commitSustain(){
  if (!sustainInput) return;
  if(window.clearPresetDisplay) clearPresetDisplay();
  const scale = Math.max(0, Math.min(10, Number(sustainInput.value) || 0));
  sustainInput.value = Number.isInteger(scale) ? String(scale) : scale.toFixed(1).replace(/\.0$/, '');
  const obj = activeObject();
  obj.s = scale / 10;
  if (currentMode() === 'live') {
    state.target = { a: state.a, d: state.d, s: state.s, floor: state.floor, scale: state.scale };
    render();
  } else {
    syncControls();
  }
  requestAnimationFrame(refreshNumericInputs);
}

function refreshNumericInputs(){
  const m = currentMode();
  const obj = activeObject();
  if (attackInput && document.activeElement !== attackInput) {
    attackInput.value = typedDisplay[m].a !== null ? typedDisplay[m].a : msFromPosition(obj.a);
  }
  if (decayInput && document.activeElement !== decayInput) {
    decayInput.value = typedDisplay[m].d !== null ? typedDisplay[m].d : msFromPosition(obj.d);
  }
  if (sustainInput && document.activeElement !== sustainInput) {
    const scale = obj.s * 10;
    sustainInput.value = Number.isInteger(scale) ? String(scale) : scale.toFixed(1).replace(/\.0$/, '');
  }
  if (floorInput && document.activeElement !== floorInput) {
    const v = obj.floor * 10;
    floorInput.value = Number.isInteger(v) ? String(v) : v.toFixed(1).replace(/\.0$/, '');
  }
  if (scaleInput && document.activeElement !== scaleInput) {
    const v = obj.scale * 10;
    scaleInput.value = Number.isInteger(v) ? String(v) : v.toFixed(1).replace(/\.0$/, '');
  }
  patchSustainReadouts();
}

function patchSustainReadouts(){
  const eff = getEffective();
  const formatted = formatSustainScale(eff.s);
  const sustainRead = document.getElementById('sustainRead');
  if (sustainRead) sustainRead.textContent = formatted;
  const sustainTarget = document.getElementById('sustainTarget');
  if (sustainTarget && currentMode() === 'animate') {
    const targetS = document.getElementById('keyboardControl').checked ? state.target.s * 0.8 : state.target.s;
    sustainTarget.textContent = 'Target: ' + formatSustainScale(targetS);
  }
}

function commitFloor(){
  if (!floorInput) return;
  if(window.clearPresetDisplay) clearPresetDisplay();
  const v = Math.max(0, Math.min(10, Number(floorInput.value) || 0));
  floorInput.value = Number.isInteger(v) ? String(v) : v.toFixed(1).replace(/\.0$/, '');
  const obj = activeObject();
  obj.floor = v / 10;
  if (currentMode() === 'live') {
    state.target = { a: state.a, d: state.d, s: state.s, floor: state.floor, scale: state.scale };
    render();
  } else { syncControls(); }
  requestAnimationFrame(refreshNumericInputs);
}

function commitScale(){
  if (!scaleInput) return;
  if(window.clearPresetDisplay) clearPresetDisplay();
  const v = Math.max(0, Math.min(10, Number(scaleInput.value) || 0));
  scaleInput.value = Number.isInteger(v) ? String(v) : v.toFixed(1).replace(/\.0$/, '');
  const obj = activeObject();

  if (currentMode() === 'live') {
    state.target = { a: state.a, d: state.d, s: state.s, floor: state.floor, scale: state.scale };
    render();
  } else { syncControls(); }
  requestAnimationFrame(refreshNumericInputs);
}

function hideLikelyAxes(){
  document.querySelectorAll('svg line, svg path, svg text').forEach(el => {
    const idClass = ((el.id || '') + ' ' + (el.getAttribute('class') || '')).toLowerCase();
    const text = (el.textContent || '').trim();

    if (/axis|xaxis|yaxis|baseline|zero-line|reference-line/.test(idClass)) {
      el.style.display = 'none';
      el.style.opacity = '0';
      return;
    }

    if (el.tagName.toLowerCase() === 'text') {
      if (text === 'TIME' || text === 'AMPLITUDE' || text === '0' || text === '1.0') {
        el.style.display = 'none';
        el.style.opacity = '0';
      }
    }

    if (el.tagName.toLowerCase() === 'line') {
      const stroke = (el.getAttribute('stroke') || '').toLowerCase();
      const op = Number(el.getAttribute('opacity') || el.style.opacity || 1);
      if ((stroke === '#ffffff' || stroke === 'white' || stroke === '#fff') && op < 0.45) {
        el.style.display = 'none';
        el.style.opacity = '0';
      }
    }
  });
}

function addPointerFeedback(){
  document.querySelectorAll('button').forEach(btn => {
    if (btn.__v28PointerFeedback) return;
    btn.__v28PointerFeedback = true;
    function press(){ btn.classList.add('v28-pressed'); }
    function release(){ setTimeout(() => btn.classList.remove('v28-pressed'), 120); }
    btn.addEventListener('pointerdown', press, true);
    btn.addEventListener('mousedown', press, true);
    btn.addEventListener('pointerup', release, true);
    btn.addEventListener('mouseup', release, true);
    btn.addEventListener('pointercancel', release, true);
    btn.addEventListener('mouseleave', release, true);
    btn.addEventListener('blur', release, true);
  });
}

// ---- Knob drag interaction ----
[
  { knobId: 'attackKnob',  sliderId: 'attack'  },
  { knobId: 'decayKnob',   sliderId: 'decay'   },
  { knobId: 'sustainKnob', sliderId: 'sustain' },
  { knobId: 'floorKnob',   sliderId: 'floor'   },
  { knobId: 'scaleKnob',   sliderId: 'scale'   },
].forEach(({ knobId, sliderId }) => {
  const knob   = $(knobId);
  const slider = $(sliderId);
  knob.style.cursor = 'ns-resize';

  let startY, startVal;

  knob.addEventListener('pointerdown', e => {
    startY   = e.clientY;
    startVal = Number(slider.value);
    knob.setPointerCapture(e.pointerId);
    e.preventDefault();
  });

  knob.addEventListener('pointermove', e => {
    if (!knob.hasPointerCapture(e.pointerId)) return;
    const delta = startY - e.clientY;            // up = positive
    const range = Number(slider.max) - Number(slider.min);
    const newVal = Math.round(clamp(startVal + delta * (range / 200), Number(slider.min), Number(slider.max)));
    slider.value = newVal;
    slider.dispatchEvent(new Event('input', { bubbles: true }));
  });

  knob.addEventListener('pointerup', e => {
    knob.releasePointerCapture(e.pointerId);
  });
});

// ---- Presets ----
(function(){
  const container = $('presetBtns');
  let activeBtn = null;

  function setTransitionTime(t){
    const fixed = document.querySelector(`input[name="transition"][value="${t}"]`);
    if(fixed){
      fixed.checked = true;
      $('customTransitionRow').style.display = 'none';
    } else {
      document.querySelector('input[name="transition"][value="custom"]').checked = true;
      $('customTransitionRow').style.display = '';
      $('customTransitionTime').value = t;
    }
  }

  window.clearPresetDisplay = function(){
    if(activeBtn){ activeBtn.style.background = ''; activeBtn.style.color = ''; activeBtn = null; }
    $('presetName').textContent = '';
  };

  PRESETS.forEach(preset => {
    const btn = document.createElement('button');
    btn.textContent = preset.name;
    btn.style.cssText = 'font-size:12px;padding:4px 7px';

    btn.addEventListener('click', () => {
      // Set target values
      state.target.a = positionFromMs(preset.a);
      state.target.d = positionFromMs(preset.d);
      state.target.s = preset.s / 10;
      state.target.floor = (preset.floor || 0) / 10;
      state.target.scale = (preset.scale !== undefined ? preset.scale : 10) / 10;

      // Configure transition time
      setTransitionTime(preset.t);

      // Highlight active preset and show name
      if(activeBtn){ activeBtn.style.background = ''; activeBtn.style.color = ''; }
      btn.style.background = '#ffffff';
      btn.style.color = '#111111';
      activeBtn = btn;
      $('presetName').textContent = `${preset.name}: ${preset.label}`;

      transition();
    });

    container.appendChild(btn);
  });
})();
